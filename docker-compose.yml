services:
  postgres:
    image: postgres:16-alpine
    container_name: users-posts-browser-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-users_posts_browser}
      POSTGRES_USER: ${DB_USERNAME:-users_posts_browser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-users_posts_browser}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-users_posts_browser} -d ${DB_NAME:-users_posts_browser}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: users-posts-browser-backend
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-users_posts_browser}
      DB_USERNAME: ${DB_USERNAME:-users_posts_browser}
      DB_PASSWORD: ${DB_PASSWORD:-users_posts_browser}
      APP_DEV_RESET_ENABLED: ${APP_DEV_RESET_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ENABLE_DEV_TOOLS: ${VITE_ENABLE_DEV_TOOLS:-false}
    container_name: users-posts-browser-frontend
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  postgres_data:
