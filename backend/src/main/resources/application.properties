spring.application.name=users-posts-browser-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:users_posts_browser}}
spring.datasource.username=${DB_USERNAME:users_posts_browser}
spring.datasource.password=${DB_PASSWORD:users_posts_browser}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

import.users-url=${IMPORT_USERS_URL:https://jsonplaceholder.typicode.com/users}
import.posts-url=${IMPORT_POSTS_URL:https://jsonplaceholder.typicode.com/posts}
import.request-timeout-ms=${IMPORT_REQUEST_TIMEOUT_MS:5000}

app.dev.reset-enabled=${APP_DEV_RESET_ENABLED:false}
